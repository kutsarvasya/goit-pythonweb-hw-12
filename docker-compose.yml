services:
  db:
    image: postgres:16
    container_name: contacts_postgres
    restart: always
    environment:
      POSTGRES_DB: contacts_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 567234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: contacts_redis
    restart: always
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: contacts_api
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file:
      - .env
   

volumes:
  postgres_data: