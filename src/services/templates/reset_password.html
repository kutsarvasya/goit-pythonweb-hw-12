<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Password Reset</title>
</head>
<body>

<p>Hi {{username}},</p>

<p>We received a request to update access to your account.</p>

<p>Please use the link below to continue:</p>

<p>

    <a href="{{host}}api/auth/reset_password/{{token}}">

        Continue

    </a>

</p>

<p>If you did not request this, you can ignore this email.</p>

</body>
</html>
